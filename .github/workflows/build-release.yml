name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            platform: macos-arm64
            binary: terraai
          - os: ubuntu-22.04
            platform: linux-x64
            binary: terraai
          - os: windows-2022
            platform: windows-x64
            binary: terraai.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-go@v5
        if: runner.os == 'Windows'
        with:
          go-version-file: launcher/go.mod

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download tiktoken BPE files
        shell: bash
        run: |
          mkdir -p tiktoken_cache
          BASE="https://openaipublic.blob.core.windows.net/encodings"
          for name in r50k_base p50k_base cl100k_base o200k_base; do
            curl -fsSL "$BASE/${name}.tiktoken" -o "tiktoken_cache/${name}.tiktoken"
          done

      - name: Build binary (macOS / Linux)
        if: runner.os != 'Windows'
        run: pyinstaller terraai.spec --noconfirm --log-level WARN

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # Onedir payload + self-extracting Go launcher instead of plain
        # onefile — see scripts/package_windows.py. Onefile re-extracts its
        # whole bundle on every single launch with no caching, which on
        # Windows measured at 9-12s vs 1.5s for the same app run plain;
        # this launcher pays that cost once (on first run only) and is
        # near-instant on every run after.
        run: python scripts/package_windows.py

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/terraai-windows-x64.exe "release/terraai-${{ matrix.platform }}.exe"
          else
            cp dist/terraai "release/terraai-${{ matrix.platform }}"
            chmod +x "release/terraai-${{ matrix.platform }}"
          fi

      - name: Sign & notarize (macOS only)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Import certificate into temporary keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain

          BINARY="release/terraai-${{ matrix.platform }}"

          # Sign
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: $APPLE_TEAM_ID" "$BINARY"

          # Zip for notarization
          ditto -c -k --keepParent "$BINARY" "$BINARY.zip"

          # Submit for notarization
          xcrun notarytool submit "$BINARY.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple
          xcrun stapler staple "$BINARY"
          rm "$BINARY.zip" certificate.p12

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraai-${{ matrix.platform }}
          path: release/
          retention-days: 7

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            binary: terraai-macos-arm64
          - os: ubuntu-22.04
            platform: linux-x64
            binary: terraai-linux-x64
          - os: windows-2022
            platform: windows-x64
            binary: terraai-windows-x64.exe

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.platform }})

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: terraai-${{ matrix.platform }}
          path: ./release

      - name: Mark executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x ./release/${{ matrix.binary }}

      - name: Smoke test — imports, encoding, data files
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: ./release/${{ matrix.binary }} smoke

      - name: Non-interactive commands
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          ./release/${{ matrix.binary }} models
          ./release/${{ matrix.binary }} providers

      - name: Wizard stdin test
        shell: bash
        timeout-minutes: 2
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          # Pipe wizard answers: new-dir, name, skip-git, ollama(15), skip-provider, local-backend, quit
          # Row 15 = ollama/llama3.2 (no API key step): 6 free + 8 paid + first local
          printf 'n\nci-smoke\ns\n15\ns\n1\n/quit\n' \
            | ./release/${{ matrix.binary }} || true
          # If the wizard crashed, config.yaml will not have been written
          if ! test -f ~/.terraai/config.yaml; then
            echo "FAIL: wizard did not save config — likely crashed before save()"
            exit 1
          fi
          echo "Wizard OK — config written to ~/.terraai/config.yaml"

  release:
    needs: [build, test]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## TerraAI ${{ github.ref_name }}

            AI-powered Terraform CLI — manage cloud infrastructure in plain English.

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `terraai-macos-arm64` |
            | Linux x86_64 | `terraai-linux-x64` |
            | Windows x64 | `terraai-windows-x64.exe` |

            ### Quick start

            ```bash
            # macOS
            chmod +x terraai-macos-arm64
            xattr -d com.apple.quarantine terraai-macos-arm64
            ./terraai-macos-arm64

            # Linux
            chmod +x terraai-linux-x64
            ./terraai-linux-x64

            # Windows (PowerShell)
            .\terraai-windows-x64.exe
            ```

            > **macOS — "Apple could not verify" warning**
            > The binary is not code-signed (no Apple Developer account required).
            > Run `xattr -d com.apple.quarantine terraai-macos-arm64` in Terminal,
            > or right-click the file → **Open** → **Open** to bypass Gatekeeper once.

            ### First run
            ```bash
            ./terraai-macos-arm64        # launches the setup wizard automatically
            ./terraai-macos-arm64 setup  # re-run setup at any time
            ```
